      (function() {
        try {
          let currentFetch = window.fetch;

          // Define a getter and a setter on window itself to intercept assignments
          try {
            Object.defineProperty(window, 'fetch', {
              get() {
                return currentFetch;
              },
              set(newFetch) {

                currentFetch = newFetch;

              configurable: true,

            });

          } catch (e) {

            // Fallback: Define on Window.prototype

              const proto = Window.prototype;

                  get() {
                    return currentFetch;
                  },
                  set(newFetch) {
                    console.log("LetsFixIt Fetch Guard: Intercepted set fetch on Window.prototype");
                    currentFetch = newFetch;
                  },
                  configurable: true,
                  enumerable: true
                });
                console.log("LetsFixIt Fetch Guard: Configured getter/setter on Window.prototype successfully");
