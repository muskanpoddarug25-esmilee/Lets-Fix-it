<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for Wrench -->
    <linearGradient id="wrenchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAB308" />
      <stop offset="50%" stop-color="#22C55E" />
      <stop offset="100%" stop-color="#15803D" />
    </linearGradient>
  </defs>

  <!-- 1. Deep Blue Map Pin with Thick Border -->
  <path d="M256 50C145.5 50 56 139.5 56 250C56 360 256 462 256 462S456 360 456 250C456 139.5 366.5 50 256 50Z" fill="#0B2553" stroke="#1E3E75" stroke-width="8" stroke-linejoin="round" />

  <!-- 2. White Circle inside Map Pin -->
  <circle cx="256" cy="225" r="105" fill="#FFFFFF" stroke="#0B2553" stroke-width="6" />

  <!-- 3. Ashoka Chakra Outer Ring -->
  <circle cx="256" cy="225" r="92" stroke="#000080" stroke-width="5" fill="none" />
  <circle cx="256" cy="225" r="96" stroke="#000080" stroke-width="1.5" fill="none" />
  <circle cx="256" cy="225" r="14" fill="#000080" />
  <circle cx="256" cy="225" r="7" fill="#FFFFFF" />

  <!-- 4. 24 Spokes of Ashoka Chakra -->
  <g stroke="#000080" stroke-width="2.5">
    <line x1="256" y1="225" x2="256" y2="133" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(15, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(30, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(45, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(60, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(75, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(90, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(105, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(120, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(135, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(150, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(165, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(180, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(195, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(210, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(225, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(240, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(255, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(270, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(285, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(300, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(315, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(330, 256, 225)" />
    <line x1="256" y1="225" x2="256" y2="133" transform="rotate(345, 256, 225)" />
  </g>

  <!-- 5. Orange Checkmark with Dark Blue Outline -->
  <!-- Checkmark Outline -->
  <path d="M175 220 L232 277 L350 150" stroke="#0B2553" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Checkmark Fill -->
  <path d="M175 220 L232 277 L350 150" stroke="#EF801A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />

  <!-- 6. Wrench with Dark Blue Outline -->
  <!-- Wrench Handle Outline -->
  <path d="M345 225 C370 270, 395 320, 412 336" stroke="#0B2553" stroke-width="36" stroke-linecap="round" />
  <!-- Wrench Handle Fill -->
  <path d="M345 225 C370 270, 395 320, 412 336" stroke="url(#wrenchGradient)" stroke-width="24" stroke-linecap="round" />

  <!-- Wrench Spanner Head -->
  <g transform="translate(418, 370) rotate(45)">
    <!-- Spanner Head Outline -->
    <path d="M -22 10 L -15 10 L -15 -30 L 15 -30 L 15 10 L 22 10 A 36 36 0 1 1 -22 10 Z" fill="#0B2553" stroke="#0B2553" stroke-width="8" stroke-linejoin="round" />
    <!-- Spanner Head Fill -->
    <path d="M -22 10 L -15 10 L -15 -30 L 15 -30 L 15 10 L 22 10 A 36 36 0 1 1 -22 10 Z" fill="url(#wrenchGradient)" />
  </g>
</svg>